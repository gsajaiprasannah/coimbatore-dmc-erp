# render.yaml — Infrastructure as Code for Render.com
# Drop this file in your GitHub repo root and Render will
# automatically provision the database + web service together.
#
# Usage: Render Dashboard → New → Blueprint → select your GitHub repo

services:
  - type: web
    name: coimbatore-dmc-erp
    env: node
    region: singapore          # closest to Coimbatore; change to frankfurt / ohio if needed
    plan: free                 # upgrade to 'starter' ($7/mo) for always-on
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_KEY
        generateValue: true    # Render auto-generates a secure random key
      - key: DATABASE_URL
        fromDatabase:
          name: coimbatore-dmc-db
          property: connectionString

databases:
  - name: coimbatore-dmc-db
    databaseName: dmc_erp
    user: dmc_user
    region: singapore
    plan: free                 # 1 GB, expires after 90 days on free tier
                               # Upgrade to 'starter' ($7/mo) for persistent storage
